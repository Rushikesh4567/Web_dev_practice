<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.9</title>
    <style>
        .card{
            width:300px;
            margin:40px auto;
            border:2px solid black;
            border-radius: 10px;
            box-sizing: border-box;
            padding: 20px;
            background-color: aqua;
            box-shadow: 0 4px 10px rgba(255, 252, 252, 0.2);
        }
        body{
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>Card Title</h3>
        <p>This is a simple card layout example.</p>
    </div>
</body>
</html>
