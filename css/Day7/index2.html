<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box model q.2</title>
    <style>
        #box{
            width: 250px;
            padding: 25px;
            border: 10px solid red;
            background-color: lightgray;
        }
        /*
        Total width calculation=>
        total = given width + left padding + right paddinng + left border + right border
        total = 250 + 25 + 25 +10 + 10
        total = 320px
        */
    </style>
</head>
<body>
    <div id="box">
        This is a box.
    </div>
</body>
</html>
