<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box model Q.3</title>
    <style>
           body {
            display: flex;   /* Makes boxes side by side */
            gap: 40px;
            padding: 40px;
        }
        .box{
            width: 300px;
            padding: 30px;
            border: 5px solid;
            background-color: aquamarine;
            
    }
    .box-border{
            width: 300px;
            padding: 30px;
            border: 5px solid;
            box-sizing: border-box;   
            background-color: crimson;
    }

    </style>
</head>
<body>
    <div class="box">
        This is box (Default)
    </div>
    <div class="box-border">
        This is box 2 (Border Box)
    </div>
</body>
</html>
