<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Navbar</title>
    <style>
        #navbar{
            height:60px;
            background-color: black;
            color:white;
        }
        .amazon{
            font-size: 25px;
            color:#f08804;
            text-decoration: none;
        }
        .acc{
            text-decoration: none;
            color: white;
        }
        button{
            background-color: #f08804;
        }
        a{
            margin-right: 200px;
        }
    </style>
</head>
<body>
    <div id="navbar">
        <a href="www.amazon.com" class="amazon">amazon.in</a>
        <a href="www.amazonac.com" class="acc">Account</a>
        <a>My Card</a>
        <a>Contact us</a>
        <input placeholder="search Amazon.in">
        <button>Search</button>
    </div>
</body>
</html>
