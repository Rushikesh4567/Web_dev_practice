<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display_none</title>
    <style>
        .hide{
            display: none;
        }
    </style>
</head>
<body>
    <div class="box">Box 1</div>
    <div class="box hide">Box 2</div>
    <div class="box">Box 3</div>
</body>
</html>
