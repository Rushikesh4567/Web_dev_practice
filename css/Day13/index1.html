<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties: 1. convert inline to block</title>
    <style>
        .box{
        display: block;
        background-color: lightblue;
    }
    </style>
</head>
<body>
    <p>This is <span class="box">First</span> text.</p>
    <p>This is <span class="box">Second</span> text.</p>
</body>
</html>
