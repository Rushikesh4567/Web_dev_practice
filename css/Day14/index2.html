<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Block Example</title>

    <style>
        span{
            display: inline-block;
            width: 200px;
            height: 100px;
            background: red;
            color: white;
            text-align: center;
            line-height: 100px;
            margin: 10px;
        }
    </style>

</head>
<body>

    <span>Box 1</span>
    <span>Box 2</span>
    <span>Box 3</span>

</body>
</html>
