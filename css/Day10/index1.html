<!DOCTYPE html>
<html>
<head>
<title>Pricing Boxes</title>

    <style>

        .container{
            display: flex;
            gap: 20px;   /* space between boxes */
        }

        .box{
            width: 250px;
            padding: 20px;
            border: 2px solid black;
            box-sizing: border-box;
            text-align: center;
        }

        .highlight{
            border: 5px solid red;   /* thicker border */
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="box">
            <h3>Basic</h3>
            <p>$10/month</p>
        </div>

        <div class="box highlight">
            <h3>Pro</h3>
            <p>$20/month</p>
        </div>

        <div class="box">
            <h3>Premium</h3>
            <p>$30/month</p>
        </div>

    </div>

</body>
</html>
