
<!DOCTYPE html>
<html>
<head>
  <title>Create Button</title>
</head>
<body>

  <script>
    let btn = document.createElement("button");
    btn.innerText = "Click Me";
    btn.style.backgroundColor = "red";
    btn.style.color = "white";

    document.body.append(btn);
  </script>

</body>
</html>
