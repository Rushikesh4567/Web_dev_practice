<!DOCTYPE html>
<html>
<head>
  <title>Dark Mode</title>

  <style>
    .dark {
      background-color: black;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Dark Mode Example</h1>

  <button onclick="toggleDarkMode()">Toggle Dark Mode</button>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
