<!DOCTYPE html>
<html>
<head>
  <title>Dynamic List</title>
</head>
<body>

  <button onclick="createList()">Create List</button>

  <script>
    function createList() {
      let ul = document.createElement("ul");

      for (let i = 1; i <= 5; i++) {
        let li = document.createElement("li");
        li.innerText = "Item " + i;
        ul.append(li);
      }

      document.body.append(ul);
    }
  </script>

</body>
</html>
