<html>

  <title>Remove Element</title>
</head>
<body>

  <div id="box" style="padding:20px; background-color:lightblue;">
    Remove Me
  </div>

  <br>

  <button onclick="removeBox()">Remove Box</button>

  <script>
    function removeBox() {

      box.remove();
    }
  </script>
