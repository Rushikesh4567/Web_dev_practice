<!DOCTYPE html>
<html>
<head>
  <title>Select by ID</title>
</head>
<body>

  <h1 id="myId">Hello World</h1>
  <button onclick="printElement()">Print Element</button>

  <script>
    function printElement() {
      let element = document.getElementById("myId");
      console.log(element);
    }
  </script>

</body>
</html>
