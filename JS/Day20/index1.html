
<!DOCTYPE html>
<html>
<head>
  <title>Change Paragraph Text</title>
</head>
<body>

  <p id="para">Original Text</p>
  <button onclick="changeText()">Change Text</button>

  <script>
    function changeText() {
      let para = document.querySelector("#para");
      para.innerText = "New Text";
    }
  </script>

</body>
</html>
